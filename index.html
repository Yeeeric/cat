<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Cat</title>
  <link rel="stylesheet" href="css/background.css">
  <link rel="stylesheet" href="css/cat.css">
  <link rel="stylesheet" href="css/effects.css">
</head>
<body>

  <!-- ── ROOM BACKGROUND ── -->
  <div id="room">

    <!-- Window with outside view -->
    <div class="window-frame">
      <div class="window-outside">
        <div class="sky"></div>
        <div class="moon"></div>
        <div class="star s1"></div><div class="star s2"></div><div class="star s3"></div>
        <div class="star s4"></div><div class="star s5"></div><div class="star s6"></div>
        <div class="tree-silhouette"></div>
        <div class="window-sill-plant"></div>
      </div>
      <div class="window-cross-h"></div>
      <div class="window-cross-v"></div>
      <div class="window-reflection"></div>
    </div>

    <!-- Bookshelf -->
    <div class="bookshelf">
      <div class="shelf-plank top-plank"></div>
      <div class="books">
        <div class="book b1"></div><div class="book b2"></div><div class="book b3"></div>
        <div class="book b4"></div><div class="book b5"></div><div class="book b6"></div>
        <div class="book b7"></div><div class="book b8"></div>
      </div>
      <div class="shelf-plank mid-plank"></div>
      <div class="books books2">
        <div class="book c1"></div><div class="book c2"></div><div class="book c3"></div>
        <div class="book c4"></div><div class="book c5"></div>
        <div class="small-plant"></div>
      </div>
      <div class="shelf-plank bot-plank"></div>
    </div>

    <!-- Fireplace -->
    <div class="fireplace">
      <div class="fireplace-surround"></div>
      <div class="fireplace-opening">
        <div class="fire">
          <div class="flame f1"></div>
          <div class="flame f2"></div>
          <div class="flame f3"></div>
          <div class="ember e1"></div>
          <div class="ember e2"></div>
          <div class="ember e3"></div>
        </div>
      </div>
      <div class="fireplace-mantle">
        <div class="clock"></div>
        <div class="candle"><div class="candle-flame"></div></div>
        <div class="candle tall"><div class="candle-flame"></div></div>
      </div>
    </div>

    <!-- Rug -->
    <div class="rug"></div>

    <!-- Armchair -->
    <div class="armchair">
      <div class="chair-back"></div>
      <div class="chair-seat"></div>
      <div class="chair-arm left-arm"></div>
      <div class="chair-arm right-arm"></div>
      <div class="chair-leg cl1"></div>
      <div class="chair-leg cl2"></div>
    </div>

    <!-- Side table with lamp -->
    <div class="side-table">
      <div class="lamp">
        <div class="lamp-shade"></div>
        <div class="lamp-pole"></div>
        <div class="lamp-base"></div>
        <div class="lamp-glow"></div>
      </div>
      <div class="table-top"></div>
      <div class="table-leg tl1"></div>
      <div class="table-leg tl2"></div>
    </div>

    <!-- Floor -->
    <div class="floor"></div>
    <div class="floor-boards">
      <div class="board"></div><div class="board"></div><div class="board"></div>
      <div class="board"></div><div class="board"></div><div class="board"></div>
    </div>

    <!-- Warm light overlay from lamp -->
    <div class="ambient-glow"></div>
  </div>

  <!-- ── CAT ── -->
  <canvas id="catCanvas"></canvas>

  <!-- ── EFFECTS ── -->
  <div id="effects-layer"></div>

  <script src="js/cat-sprite.js"></script>
  <script src="js/cat-physics.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
